<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cossette+Texte:wght@400;700&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Miniver&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Quintessential&family=Rubik+Glitch&family=Saira:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <form action="#" method="post" class="form">
            <div class="sign-up">

                <h1>Sign Up</h1>

                <label for="email">Email</label>
                <input type="email" placeholder="johndoe@example.com" id="email">

                <label for="password">Password</label>
                <input type="password" placeholder="Password" id="password" required>

                <button class="signUpBtn">Sign Up</button>

                <p>Have an account? <a href="#">Log In</a></p>
                
                <div class="logos">
                    <a href="#"><img src="logos/youtube.png" alt="Youtube"></a>
                    <a href="#"><img src="logos/instagram.png" alt="Instagram"></a>
                    <a href="#"><img src="logos/social.png" alt="Whatsapp"></a>
                    <a href="#"><img src="logos/linkedin.png" alt="LinkedIn"></a>
                </div>
                
            </div>

            <div class="log-in">
                <h1>Log In</h1>

                <label for="Email">Email</label>
                <input type="email" placeholder="Email" id="Email" required>

                <label for="Password">Password</label>
                <input type="password" placeholder="Password" id="Password" required>

                <label for="remember-me"><input type="checkbox" id="remember-me">Remember me</label>

                <button class="logInBtn">Log In</button>

                <p>Or login with</p>

                <div class="logos">
                    <a href="#"><img src="logos/facebook.png" alt="Facebook"></a>
                    <a href="#"><img src="logos/search.png" alt="Goole"></a>
                </div>

                <p>Don't have an account? <a href="#">Sign Up</a></p>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
