<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator">
        <div class="screen"></div>
        <div class="btns">
            <button>1</button>
            <button>2</button>
            <button>9</button>
            <button>0</button>
            <button>3</button>
            <button>4</button>
            <button style="background-color: blueviolet;">+</button>
            <button style="background-color: blueviolet;">-</button>
            <button>5</button>
            <button>6</button>

            <button style="background-color: blueviolet;">/</button>
            <button style="background-color: blueviolet;">*</button>
            <button>7</button>
            <button>8</button>
            <button style="background-color: blueviolet;">=</button>
            <button style="background-color: red;">AC</button>

            <button>.</button>
            <button style="background-color: blueviolet;">C</button>
            
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
